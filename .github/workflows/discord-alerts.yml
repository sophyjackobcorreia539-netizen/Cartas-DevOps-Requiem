name: CI/CD + Discord Alerts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar projeto
        run: javac -d build main/Main.java

      - name: Rodar aplicação
        run: echo "5" | java -cp build main.Main

      # ALERTA PADRÃO
      - name: Notificar Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CAPTAN_HOOK }}
        run: |
          curl -X POST "$WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \" Novo commit de ${{ github.actor }}\"}"

      # ALERTA DE MERGE
      - name: Notificar Discord (merge)
        if: contains(github.event.head_commit.message, 'Merge pull request')
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": " Merge realizado na main",
              "color": 15548997,
              "fields": [
                {"name": " Autor", "value": "${{ github.actor }}", "inline": true},
                {"name": " Repositório", "value": "${{ github.repository }}", "inline": false}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK_CAPTAN_HOOK }}